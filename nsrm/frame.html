<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<title>N-SRM Demo — 1200 × 750 Frame</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --frame-w:1280px;
  --frame-h:750px;
  --bar-h:32px;
  --inner-w:1280px;
  --inner-h:750px;
  --scale:1;
  --bg:#d5dae6;
  --shell-bg:#f0f0f0;
  --accent:#5b7bfa;
}

html,body{
  width:100%;min-height:100vh;
  font-family:'Pretendard',-apple-system,sans-serif;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  overscroll-behavior:contain;
}

/* ── 셸 ── */
.shell{
  width:var(--frame-w);height:var(--frame-h);
  background:var(--shell-bg);
  border-radius:12px;
  box-shadow:0 24px 80px rgba(16,20,44,.22),
             0 0 0 1px rgba(0,0,0,.08);
  overflow:hidden;display:flex;flex-direction:column;
}

/* ── 타이틀 바 ── */
.bar{
  height:var(--bar-h);min-height:var(--bar-h);
  background:linear-gradient(180deg,#e8e8e8 0%,#dedede 100%);
  display:flex;align-items:center;padding:0 12px;gap:8px;
  border-bottom:1px solid rgba(0,0,0,.09);
  user-select:none;-webkit-user-select:none;
}
.dots{display:flex;gap:6px;flex-shrink:0}
.dot{width:10px;height:10px;border-radius:50%}
.dot-r{background:#ff5f57}.dot-y{background:#febc2e}.dot-g{background:#28c840}

.addr{
  flex:1;max-width:460px;height:22px;margin:0 auto;
  background:#fff;
  border:1px solid rgba(0,0,0,.10);border-radius:5px;
  display:flex;align-items:center;padding:0 9px;gap:5px;
}
.addr svg{width:9px;height:9px;color:rgba(0,0,0,.35);flex-shrink:0}
.addr span{font-size:11px;color:rgba(0,0,0,.45);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.ctrls{display:flex;gap:5px;flex-shrink:0}
.cb{
  width:26px;height:22px;border:none;border-radius:4px;
  background:rgba(0,0,0,.05);color:rgba(0,0,0,.40);
  font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .15s,color .15s;
}
.cb:hover{background:rgba(0,0,0,.10);color:rgba(0,0,0,.65)}
.cb.on{color:var(--accent)}

/* ── 뷰포트 ── */
.vp{
  flex:1;width:var(--frame-w);overflow:hidden;
  background:var(--bg);position:relative;
}
.vp iframe{
  width:var(--inner-w);height:var(--inner-h);border:none;
  transform:scale(var(--scale));transform-origin:top left;
  position:absolute;top:0;left:0;
}
</style>
</head>
<body>
<div class="shell">
  <div class="bar">
    <div class="dots"><span class="dot dot-r"></span><span class="dot dot-y"></span><span class="dot dot-g"></span></div>
    <div class="addr">
      <svg viewBox="0 0 10 10" fill="none"><rect x="1.5" y="4.5" width="7" height="5" rx="1" fill="currentColor"/><path d="M3 4.5V3a2 2 0 014 0v1.5" stroke="currentColor" stroke-width="1" fill="none"/></svg>
      <span>nsrm.samsung.com</span>
    </div>
    <div class="ctrls">
      <button class="cb" id="bp" title="일시정지/재생">❚❚</button>
      <button class="cb" id="br" title="처음부터">↻</button>
    </div>
  </div>
  <div class="vp">
    <iframe id="f" src="index.html?embed=1&v=8"></iframe>
  </div>
</div>
<script>
(function(){
  /* ★ 데모 시작 전 이전 세션 데이터 정리 — 항상 깨끗한 상태에서 시작 */
  try{
    sessionStorage.removeItem('nsrm-demo-finished');
    sessionStorage.removeItem('nsrm-demo-continue');
    sessionStorage.removeItem('nsrm-onboarding-seen');
    sessionStorage.removeItem('nsrm-show-onboarding');
  }catch(e){}

  var f=document.getElementById('f'),bp=document.getElementById('bp'),br=document.getElementById('br'),p=false;
  function cmd(c){try{f.contentWindow.postMessage({type:'nsrm-demo',cmd:c},'*')}catch(e){}}
  bp.addEventListener('click',function(){p=!p;cmd(p?'pause':'play');bp.textContent=p?'▶':'❚❚';bp.classList.toggle('on',p)});

  /* ★ restart: iframe src를 리셋해서 완전히 새로 로드 */
  function reloadDemo(){
    p=false;bp.textContent='❚❚';bp.classList.remove('on');
    try{
      sessionStorage.removeItem('nsrm-demo-finished');
      sessionStorage.removeItem('nsrm-demo-continue');
      sessionStorage.removeItem('nsrm-onboarding-seen');
      sessionStorage.removeItem('nsrm-show-onboarding');
    }catch(e){}
    f.src='index.html?embed=1&t='+Date.now();
  }
  br.addEventListener('click',reloadDemo);

  /* 내부 콘텐츠(demo-replay.js)에서 리플레이 요청 수신 */
  window.addEventListener('message',function(e){
    if(e.data&&e.data.type==='nsrm-replay') reloadDemo();
  });

  /* frame.html 자체에서 wheel 차단 */
  document.addEventListener('wheel',function(e){e.preventDefault();},{passive:false,capture:true});
  document.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false,capture:true});
})();
</script>
</body>
</html>
